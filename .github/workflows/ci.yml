name: CI

# Build the engine library and CLI with two compilers at two optimisation
# levels, then run the whole suite — conformance, disassembler-vs-objdump, cache,
# pipeline, the GDB remote stub, the MMIO devices — plus the libquanta embedding
# example. Warnings are errors here, so the tree must stay clean under -Wall -Wextra.
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
        buildtype: [release, debug]
    name: ${{ matrix.cc }} / ${{ matrix.buildtype }}
    steps:
      - uses: actions/checkout@v4

      # The .S test programs are assembled by the RISC-V cross-toolchain;
      # check-disasm also needs its objdump. Built -nostdlib, so no multilib
      # libraries are required — just the assembler, linker, and driver.
      - name: Install RISC-V cross-toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf

      - name: Configure build
        run: |
          echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"
          base="-std=c11 -Wall -Wextra -Werror -Isrc"
          if [ "${{ matrix.buildtype }}" = "debug" ]; then
            echo "CFLAGS=$base -g -O0" >> "$GITHUB_ENV"
          else
            echo "CFLAGS=$base -O2" >> "$GITHUB_ENV"
          fi

      - name: Build (libquanta + CLI)
        run: make

      - name: Embedding example
        run: make embed

      - name: RV32I conformance
        run: make check

      - name: Disassembler vs objdump
        run: make check-disasm

      - name: Cache model
        run: make check-cache

      - name: Pipeline model
        run: make check-pipeline

      # python3 is preinstalled on ubuntu-latest; the client speaks raw RSP, so
      # no riscv gdb is needed.
      - name: GDB remote stub
        run: make check-gdb

      - name: Platform devices and interrupts
        run: make check-devices

  differential:
    runs-on: ubuntu-latest
    name: differential (vs qemu-riscv32)
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-toolchain and qemu-user
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf qemu-user-static

      - name: Build
        run: make

      - name: Differential vs qemu-riscv32
        run: make check-diff

      # qemu-user-static also provides qemu-riscv64-static, so the RV64 suite's
      # golden-model differential runs here too.
      - name: RV64 conformance vs qemu-riscv64
        run: make check-rv64

  conformance:
    runs-on: ubuntu-latest
    name: conformance (riscv-arch-test)
    steps:
      - uses: actions/checkout@v4

      # Only the cross-toolchain is needed: check-arch clones the test suite
      # itself (it ships the reference signatures, so no reference model).
      - name: Install RISC-V cross-toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf

      - name: Build
        run: make

      - name: Official architectural conformance
        run: make check-arch

  sanitizers:
    runs-on: ubuntu-latest
    name: sanitizers (asan+ubsan)
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-toolchain and qemu-user
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf qemu-user-static

      - name: Build + run the suite under ASan/UBSan
        run: make sanitize

  fuzz:
    runs-on: ubuntu-latest
    name: fuzz (libfuzzer smoke)
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-toolchain and clang
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf clang

      - name: Build seed ELFs and fuzzers
        run: |
          make tests
          make fuzz

      # Fuzz each surface for a short, fixed budget. Engine stderr is captured to
      # a log (kept clean on success); on a crash, show the tail — which holds the
      # sanitizer report — and the crashing input is uploaded below.
      - name: Fuzz the ELF loader
        run: |
          mkdir -p corpus/elf && cp tests/*.elf corpus/elf/
          ./fuzz/fuzz_elf -max_total_time=40 -error_exitcode=1 corpus/elf 2>fuzz_elf.log \
            || { echo '=== fuzz_elf.log (tail) ==='; tail -100 fuzz_elf.log; exit 1; }

      - name: Fuzz decode/execute
        run: |
          ./fuzz/fuzz_decode -max_total_time=40 -error_exitcode=1 2>fuzz_decode.log \
            || { echo '=== fuzz_decode.log (tail) ==='; tail -100 fuzz_decode.log; exit 1; }

      - name: Upload crash inputs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            crash-*
            timeout-*
            oom-*
          if-no-files-found: ignore

  coverage:
    runs-on: ubuntu-latest
    name: coverage (gcov/lcov)
    steps:
      - uses: actions/checkout@v4

      # The instrumented suite still drives the guest ELFs, so the cross-toolchain
      # is needed; lcov turns the .gcda into a report and HTML.
      - name: Install cross-toolchain and lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf lcov

      # Instrumented rebuild + whole suite; tests/coverage.sh prints the per-file
      # table and aggregate to the log — the per-PR coverage report — and writes
      # the HTML under build/coverage/html.
      - name: Build instrumented, run suite, report coverage
        run: make coverage

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build/coverage/html
          if-no-files-found: ignore

  static-analysis:
    runs-on: ubuntu-latest
    name: static analysis (cppcheck/clang-tidy/scan-build)
    steps:
      - uses: actions/checkout@v4

      # Analyzers only — they read src/ directly (cppcheck, clang-tidy) or wrap a
      # host build (scan-build), so no cross-toolchain is needed. clang-tools
      # provides scan-build and pulls in clang for clang-tidy's analysis.
      - name: Install analyzers
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy clang-tools

      - name: cppcheck + clang-tidy
        run: make analyze

      # The clang static analyzer over a real build. --status-bugs makes a
      # finding fail the job; the HTML report is uploaded on failure.
      - name: clang static analyzer (scan-build)
        run: |
          make clean
          scan-build --status-bugs -o build/scan make

      - name: Upload scan-build report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scan-build-report
          path: build/scan
          if-no-files-found: ignore
